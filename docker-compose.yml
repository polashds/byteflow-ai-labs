name: byteflow-app
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - db
    networks:
      - internal
      - proxy
    volumes:
      - uploads:/app/public/uploads
    mem_limit: 1g
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.byteflow.rule=Host(`byteflow.ai`) || Host(`www.byteflow.ai`)"
      - "traefik.http.routers.byteflow.entrypoints=websecure"
      - "traefik.http.routers.byteflow.tls.certresolver=le"
      - "traefik.http.services.byteflow.loadbalancer.server.port=3000"
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: byteflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: byteflow
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 1g

networks:
  internal:
  proxy:
    external: true

volumes:
  pgdata:
  uploads:
